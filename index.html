<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberShield</title>

<link rel="icon" type="image/png" href="favicon.png">

<meta name="description" content="Learn ethical cyber awareness, protect your digital identity and stay safe in cyberspace.">

<meta property="og:title" content="CyberShield | Cyber Security Awareness">
<meta property="og:description" content="Learn ethical cyber awareness, protect your digital identity and stay safe in cyberspace.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://denuone-cyberghost.github.io/CyberShield/">
<meta property="og:image" content="https://denuone-cyberghost.github.io/CyberShield/preview.png">

<style>
html { scroll-behavior: smooth; }

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: monospace;
}

body{
background:black;
color:#00ffcc;
overflow-x:hidden;
}

/* MATRIX */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* HEADER */
header{
padding:20px;
text-align:center;
border-bottom:1px solid #00ffcc;
}

header h1{
font-size:30px;
letter-spacing:4px;
text-shadow:0 0 15px #00ffcc;
animation: glow 2s infinite;
}

@keyframes glow{
0%{text-shadow:0 0 5px #00ffcc;}
50%{text-shadow:0 0 20px #00ffcc;}
100%{text-shadow:0 0 5px #00ffcc;}
}

/* HERO */
.hero{
height:85vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

#welcome{
font-size:45px;
letter-spacing:3px;
white-space:nowrap;
overflow:hidden;
border-right:3px solid #00ffcc;
animation: typing 3s steps(22,end) forwards, blink 0.7s infinite;
}

@keyframes typing{ from{width:0;} to{width:100%;} }
@keyframes blink{ 50%{border-color:transparent;} }

/* BUTTON */
.btn{
margin-top:25px;
padding:10px 25px;
border:1px solid #00ffcc;
background:transparent;
color:#00ffcc;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#00ffcc;
color:black;
box-shadow:0 0 20px #00ffcc;
}

/* BOOT SCREEN */
#boot-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:black;
color:#00ffcc;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

.loader{
width:200px;
height:2px;
background:#003333;
overflow:hidden;
margin-top:20px;
position:relative;
}

.loader::before{
content:"";
position:absolute;
width:40%;
height:100%;
background:#00ffcc;
animation: load 1.8s infinite;
}

@keyframes load{
0%{left:-40%;}
100%{left:100%;}
}

/* PRELOAD PAUSE */
.preload *{
animation-play-state:paused !important;
transition:none !important;
}
</style>
</head>

<body class="preload">

<!-- BOOT SCREEN -->
<div id="boot-screen">
<h1>SYSTEM BOOTING...</h1>
<p>CYBERSHIELD INITIALIZING 🔐</p>
<div class="loader"></div>
</div>

<canvas id="matrix"></canvas>

<header>
<h1>CyberShield</h1>
</header>

<section class="hero">
<h2 id="welcome">WELCOME TO CYBERSHIELD</h2>

<p>Learn ethical cyber awareness, protect your digital identity.</p>

<button class="btn" onclick="alert('ACCESS GRANTED 🔐')">
ENTER SYSTEM
</button>
</section>

<script>
/* MATRIX (FIXED + SLOW + CLEAN) */

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

let letters = "01CYBERSHIELDHACKERSECURITY".split("");
const fontSize = 14;

let columns, drops;

function initMatrix(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

columns = canvas.width / fontSize;
drops = Array(Math.floor(columns)).fill(1);
}

let lastTime = 0;
let speed = 60; // 🔥 SLOWER MATRIX

function draw(time){

if(time - lastTime > speed){
lastTime = time;

ctx.fillStyle="rgba(0,0,0,0.08)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ffcc";
ctx.font = fontSize+"px monospace";

for(let i=0;i<drops.length;i++){
let text = letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize > canvas.height && Math.random()>0.975){
drops[i]=0;
}
drops[i]++;
}
}

requestAnimationFrame(draw);
}

function startMatrix(){
initMatrix();
requestAnimationFrame(draw);
}

/* BOOT CONTROL (FIXED - ONLY ONCE) */
window.addEventListener("load", () => {
setTimeout(() => {

document.getElementById("boot-screen").style.display="none";
document.body.classList.remove("preload");

startMatrix();

}, 2500);
});
</script>

</body>
</html>
